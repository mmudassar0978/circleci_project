version: 2.1

jobs:
  build-and-push:
    docker:
      - image: cimg/base:stable

    steps:
      - checkout

      - setup_remote_docker

      - run:
          name: Build Docker Image
          command: |
            docker build -t $DOCKER_USERNAME/resume-app:latest .

      - run:
          name: Login to Docker Hub
          command: |
            echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin

      - run:
          name: Push Image
          command: |
            docker push $DOCKER_USERNAME/resume-app:latest

  deploy:
    docker:
      - image: cimg/base:stable

    steps:
      - run:
          name: Install SSH
          command: |
            sudo apt update
            sudo apt install -y openssh-client

      - run:
          name: Deploy to Ubuntu Server
          command: |
            ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "
              docker pull $DOCKER_USERNAME/resume-app:latest &&
              docker stop resume || true &&
              docker rm resume || true &&
              docker run -d -p 80:80 --name resume $DOCKER_USERNAME/resume-app:latest
            "

workflows:
  version: 2
  build_deploy:
    jobs:
      - build-and-push
      - deploy:
          requires:
            - build-and-push